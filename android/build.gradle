import org.apache.tools.ant.taskdefs.condition.Os

// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 32
        compileSdkVersion = 36
        targetSdkVersion = 36
        kotlinVersion = "2.1.20"
        playServicesLocationVersion = "21.0.1"
        ndkVersion = "28.0.13004108"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.9.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("de.undercouch:gradle-download-task:5.0.1")
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

allprojects {
    repositories {
        maven {
            url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        mavenCentral {
            // We don't want to fetch react-native from Maven Central as there are
            // older versions over there.
            content {
                excludeGroup "com.facebook.react"
            }
        }
        google()
        maven { url 'https://www.jitpack.io' }
    }
}

subprojects { subproject ->
    afterEvaluate {
        def android = subproject.extensions.findByName("android")
        if (android == null) {
            return
        }

        if (android.hasProperty("compileOptions")) {
            android.compileOptions.sourceCompatibility = JavaVersion.VERSION_17
            android.compileOptions.targetCompatibility = JavaVersion.VERSION_17
        }

        if (android.hasProperty("buildFeatures")) {
            android.buildFeatures.buildConfig = true
        }

        subproject.tasks.matching { task ->
            task.hasProperty("kotlinOptions")
        }.configureEach { task ->
            task.kotlinOptions.jvmTarget = "17"
        }

        if (!android.hasProperty("namespace") || android.namespace != null) {
            return
        }

        def manifestFile = android.sourceSets?.findByName("main")?.manifest?.srcFile
        if (manifestFile == null || !manifestFile.exists()) {
            return
        }

        def manifest = new XmlSlurper(false, false).parse(manifestFile)
        def manifestPackage = manifest.@package?.text()
        if (manifestPackage) {
            android.namespace = manifestPackage
        }
    }
}
